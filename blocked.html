<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang bị chặn</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, rgba(124,58,237,0.22), transparent 30%), linear-gradient(135deg, #111827 0%, #1f2937 48%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      color: #e5e7eb;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    .icon {
      font-size: 68px;
      margin-bottom: 16px;
      display: block;
    }

    h1 {
      font-size: 30px;
      color: #fff;
      margin-bottom: 12px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .domain {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      color: #fda4af;
      display: inline-block;
      margin: 18px 0 12px;
      font-weight: 700;
      word-break: break-all;
    }

    .reason {
      font-size: 14px;
      color: rgba(229, 231, 235, 0.82);
      margin: 14px 0 20px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 22px;
      border-radius: 12px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .btn-back {
      background: rgba(148, 163, 184, 0.12);
      color: #fff;
      border: 1px solid rgba(148, 163, 184, 0.2);
      flex: 1;
      min-width: 150px;
    }

    .btn-back:hover {
      background: rgba(148, 163, 184, 0.18);
      transform: translateY(-2px);
    }

    .btn-home {
      background: rgba(124, 58, 237, 0.16);
      color: #c4b5fd;
      border: 1px solid rgba(124, 58, 237, 0.35);
      flex: 1;
      min-width: 150px;
    }

    .btn-home:hover {
      background: rgba(124, 58, 237, 0.24);
    }

    #request-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    #block-reason-msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.6;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.65);
      min-height: 40px;
    }

    #btn-request-access {
      width: 100%;
      padding: 12px 20px;
      background: rgba(124,58,237,0.2);
      color: #c4b5fd;
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #btn-request-access:hover:not(:disabled) {
      background: rgba(124,58,237,0.28);
    }

    #btn-request-access:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #request-status {
      display: none;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }

    #polling-indicator {
      display: none;
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    .tips {
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.18);
      border-radius: 14px;
      padding: 16px;
      margin-top: 20px;
      text-align: left;
      font-size: 13px;
      color: #bfdbfe;
    }

    .tips strong {
      display: block;
      margin-bottom: 4px;
      color: #dbeafe;
    }

    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      color: rgba(229, 231, 235, 0.55);
    }

    .footer-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }

    @media (max-width: 520px) {
      .card {
        padding: 28px 18px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🚫</span>
    <h1>Trang web bị chặn</h1>

    <div class="domain" id="domain-display">example.com</div>
    <p class="reason" id="reason-display">Không có trong danh sách được phép</p>

    <div class="buttons">
      <button class="btn btn-back" onclick="history.back()">← Quay lại</button>
      <button class="btn btn-home" onclick="window.location.href='https://www.google.com'">🏠 Trang chủ</button>
    </div>

    <div id="request-section" style="margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08);">
      <div id="block-reason-msg">
        Đang kiểm tra...
      </div>

      <button id="btn-request-access">
        <span>📨</span>
        <span id="btn-request-text">Gửi yêu cầu cho bố/mẹ</span>
      </button>

      <div id="request-status"></div>

      <div id="polling-indicator">
        ⟳ Đang kiểm tra trạng thái... trang sẽ tự mở khi được cho phép
      </div>
    </div>

    <div class="tips">
      <strong>💡 Mẹo:</strong>
      Nếu bạn muốn truy cập trang này, hãy liên hệ bố/mẹ để được cấp quyền truy cập.
    </div>

    <div class="footer">
      <div class="footer-icon">🛡️</div>
      <p>Family Guardian — Bộ lọc web an toàn</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
