<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Guardian</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header h2 {
      font-size: 14px;
      font-weight: 600;
      color: white;
    }

    .status-card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin: 6px 0;
    }

    .status-row span:first-child {
      font-weight: 500;
      color: #666;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.on {
      background: #dcfce7;
      color: #166534;
    }

    .badge.off {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.na {
      background: #f3f4f6;
      color: #6b7280;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .btn-logout {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-logout:hover {
      background: #e5e7eb;
    }

    .btn-login {
      background: white;
      color: #667eea;
    }

    .btn-login:hover {
      background: #f0f4ff;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #loading {
      text-align: center;
      color: white;
      font-size: 12px;
      padding: 20px;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #login-section {
      display: none;
      text-align: center;
      padding: 20px 0;
    }

    #login-section p {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    #content {
      display: none;
    }

    .user-info {
      font-size: 12px;
      color: #4b5563;
      margin-top: 4px;
    }

    .link {
      color: #667eea;
      text-decoration: none;
      font-size: 11px;
      margin-top: 8px;
      display: inline-block;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">🛡️</div>
      <h2>Family Guardian</h2>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 8px;">Đang tải...</p>
    </div>

    <div id="content">
      <div class="status-card">
        <div class="status-row">
          <span>Tài khoản</span>
          <span class="user-info" id="user-email">—</span>
        </div>
        <div class="status-row">
          <span>Bộ lọc web</span>
          <span id="filter-badge" class="badge na">—</span>
        </div>
      </div>
      <button class="btn btn-logout" id="btn-logout">Đăng xuất</button>
      <a id="guide-link" target="_blank" class="link">Hướng dẫn cài đặt</a>
    </div>

    <div id="login-section">
      <p>Đăng nhập bằng tài khoản Google của con để kích hoạt bộ lọc.</p>
      <button class="btn btn-login" id="btn-login">Đăng nhập Google</button>
    </div>
  </div>

  <script src="env.js"></script>
  <script src="popup.js"></script>
</body>
</html>
